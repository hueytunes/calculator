<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Lab Calculator Suite</title>

  <!-- PWA & iOS App Capability -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LabCalc">
  <meta name="theme-color" content="#fbf6ef" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1f1812" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="manifest.json">
  <!-- iOS home-screen icon. Also exists at /apple-touch-icon.png which iOS
       auto-probes as a fallback, regardless of what we put in <link>. -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon.png">
  <link rel="apple-touch-icon-precomposed" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="logo.png">
  <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
  <link rel="icon" type="image/png" href="logo.png">

  <!-- Theme preflight (avoids FOUC) -->
  <script>
    (function () {
      try {
        var pref = localStorage.getItem('labcalc.settings');
        var parsed = pref ? JSON.parse(pref) : {};
        var theme = parsed.theme || 'auto';
        var wantsDark = theme === 'dark' ||
          (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (wantsDark) document.documentElement.classList.add('dark');
      } catch (e) { /* ignore */ }
    })();
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Theme tokens + components -->
  <link rel="stylesheet" href="css/theme.css" />
</head>
<body>

  <div class="shell">
    <!-- Status bar / brand -->
    <header class="status-bar">
      <div style="display:inline-flex; align-items:center; gap:10px">
        <img src="apple-touch-icon.png" alt="" width="32" height="32" style="border-radius:8px;box-shadow:0 4px 12px -4px rgba(229,106,79,0.5);display:block" />
        <span style="font-weight:800;font-size:15px;letter-spacing:-0.01em">Lab Calc</span>
      </div>
      <button id="theme-toggle" aria-label="Toggle theme"
        style="background:var(--card);border:none;width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);box-shadow:0 4px 10px -4px rgba(42,31,20,0.15)">
        <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
    </header>

    <!-- Screen container: screens render into this -->
    <main class="screens" id="screens">
      <div class="screen" id="screen-home" data-screen="home"></div>
      <div class="screen" id="screen-recipes" data-screen="recipes"></div>
      <div class="screen" id="screen-history" data-screen="history"></div>
      <div class="screen" id="screen-settings" data-screen="settings"></div>

      <div class="screen" id="screen-dilution" data-screen="dilution"></div>
      <div class="screen" id="screen-concentration" data-screen="concentration"></div>
      <div class="screen" id="screen-reconstitution" data-screen="reconstitution"></div>
      <div class="screen" id="screen-seeding" data-screen="seeding"></div>
      <div class="screen" id="screen-serial" data-screen="serial"></div>
      <div class="screen" id="screen-builder" data-screen="builder"></div>
    </main>

    <!-- Bottom tab bar -->
    <nav class="tab-bar" aria-label="Primary">
      <button class="tab" data-target="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2h-4v-6h-6v6H5a2 2 0 01-2-2V9z"/></svg>
        <span class="tab-label">Home</span>
      </button>
      <button class="tab" data-target="recipes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v7l-5 8a2 2 0 002 3h12a2 2 0 002-3l-5-8V3M9 3h6M9 3H7m8 0h2"/></svg>
        <span class="tab-label">Recipes</span>
      </button>
      <button class="tab" data-target="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span class="tab-label">History</span>
      </button>
      <button class="tab" data-target="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1A1.7 1.7 0 004.6 9a1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3h.1A1.7 1.7 0 0010 3.1V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8v.1a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>
        <span class="tab-label">Settings</span>
      </button>
    </nav>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
